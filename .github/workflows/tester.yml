# .github/workflows/tester.yml
#
# Phase 1 Tester Agent — runs Claude Code static analysis on each PR.
# Posts structured YAML report as PR comment + Slack notification.
#
# Setup (do once per repo):
#   1. GitHub Settings → Secrets:
#      - ANTHROPIC_API_KEY  (from console.anthropic.com)
#      - SLACK_WEBHOOK_URL  (incoming webhook URL of #cust-<name> channel)
#   2. Copy this file to .github/workflows/tester.yml in customer repo
#   3. Copy prompts/tester-system-prompt.md to .github/tester-prompt.md
#   4. Open PR — workflow runs

name: Tester Agent (Phase 1)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write   # for posting comments

jobs:
  tester:
    name: Tester Agent — static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history for `git diff base...head`
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install Claude Code CLI
        run: |
          set -e
          # Use the same install method as Anthropic's official one
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify Claude Code
        run: |
          claude --version

      - name: Collect PR context
        id: context
        env:
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only "origin/$BASE_BRANCH...$HEAD_SHA" | head -50)

          # Save to file (multi-line via heredoc to env)
          {
            echo "changed_files<<EOF"
            echo "$CHANGED_FILES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          # Save full diff to a file (capped) for Claude to read
          git diff "origin/$BASE_BRANCH...$HEAD_SHA" > /tmp/pr.diff
          wc -l /tmp/pr.diff

      - name: Run Tester Agent
        id: tester
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO_NAME: ${{ github.repository }}
          CHANGED_FILES: ${{ steps.context.outputs.changed_files }}
        run: |
          set -e

          # Build the prompt by substituting env vars into template.
          # If template doesn't exist (first install), use inline fallback.
          if [ -f .github/tester-prompt.md ]; then
            envsubst < .github/tester-prompt.md > /tmp/prompt.txt
          else
            # Inline fallback prompt
            cat > /tmp/prompt.txt <<EOF
          You are the Tester Agent. Review PR #${PR_NUMBER} ("${PR_TITLE}") on ${REPO_NAME}.

          Base branch: ${BASE_BRANCH}
          Head SHA: ${HEAD_SHA}

          PR description:
          ${PR_BODY}

          Files changed:
          ${CHANGED_FILES}

          Read /tmp/pr.diff for full diff. Read CLAUDE.md in repo root.

          Output a single YAML document with these keys:
            classification (PASS | NEEDS_WORK | RISKY)
            summary
            modules_changed
            analysis (changes_overview, potential_issues, missing_tests, acceptance_criteria_check, security_review)
            suggested_actions
            attempt: 1/3

          Output ONLY the YAML.
          EOF
          fi

          # Run Claude Code headless
          claude -p "$(cat /tmp/prompt.txt)" \
            --output-format json \
            --permission-mode acceptEdits \
            > /tmp/claude_output.json 2>&1

          # Extract result text
          jq -r '.result' /tmp/claude_output.json > /tmp/tester_report.yaml

          # Capture cost + tokens for Slack
          COST=$(jq -r '.total_cost_usd // 0' /tmp/claude_output.json)
          INPUT_TOKENS=$(jq -r '.usage.input_tokens // 0' /tmp/claude_output.json)
          OUTPUT_TOKENS=$(jq -r '.usage.output_tokens // 0' /tmp/claude_output.json)

          {
            echo "cost=$COST"
            echo "input_tokens=$INPUT_TOKENS"
            echo "output_tokens=$OUTPUT_TOKENS"
          } >> $GITHUB_OUTPUT

          # Echo report for log visibility
          echo "═══ Tester Report ═══"
          cat /tmp/tester_report.yaml
          echo "═══════════════════════"

      - name: Parse classification for status
        id: classification
        run: |
          # Try to extract classification field robustly (handles both
          # `classification: PASS` and `classification: 'PASS'`)
          CLS=$(grep -E '^classification:' /tmp/tester_report.yaml \
                | head -1 \
                | sed 's/classification:[[:space:]]*//' \
                | tr -d "'\"" \
                | xargs)
          if [ -z "$CLS" ]; then
            CLS="UNKNOWN"
          fi
          echo "classification=$CLS" >> $GITHUB_OUTPUT
          echo "Classification: $CLS"

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/tester_report.yaml', 'utf8');
            const cls = '${{ steps.classification.outputs.classification }}';
            const cost = '${{ steps.tester.outputs.cost }}';
            const inT = '${{ steps.tester.outputs.input_tokens }}';
            const outT = '${{ steps.tester.outputs.output_tokens }}';

            const emoji = cls === 'PASS' ? '✅'
                        : cls === 'RISKY' ? '🚨'
                        : cls === 'NEEDS_WORK' ? '⚠️'
                        : '❓';

            const body = `## ${emoji} Tester Agent — ${cls}

            <details>
            <summary>Full report (YAML)</summary>

            \`\`\`yaml
            ${report}
            \`\`\`

            </details>

            <sub>💰 Cost: \$${cost} · Tokens: ${inT}in / ${outT}out · Powered by Claude Code (Phase 1 — static analysis)</sub>`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      - name: Notify Slack
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          CLS="${{ steps.classification.outputs.classification }}"
          EMOJI="❓"
          [ "$CLS" = "PASS" ] && EMOJI="✅"
          [ "$CLS" = "RISKY" ] && EMOJI="🚨"
          [ "$CLS" = "NEEDS_WORK" ] && EMOJI="⚠️"

          # Get summary from YAML
          SUMMARY=$(grep -E '^summary:' /tmp/tester_report.yaml | head -1 | sed 's/summary:[[:space:]]*//' | tr -d '"' | head -c 200)

          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d @- <<EOF
          {
            "text": "$EMOJI Tester Agent — *$CLS*",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "$EMOJI *Tester Agent: $CLS*\n<$PR_URL|$PR_TITLE>\nAuthor: $PR_AUTHOR"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "_${SUMMARY}_"
                }
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "💰 \$${{ steps.tester.outputs.cost }} · ${{ steps.tester.outputs.input_tokens }}in/${{ steps.tester.outputs.output_tokens }}out tokens"
                  }
                ]
              }
            ]
          }
          EOF

      - name: Fail on RISKY (optional gate)
        if: steps.classification.outputs.classification == 'RISKY'
        run: |
          echo "::warning::Tester classified PR as RISKY — review report"
          # Note: not exit 1 — humans decide whether to merge.
          # Change to `exit 1` if you want to block merging on RISKY.
