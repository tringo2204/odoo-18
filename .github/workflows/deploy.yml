name: Deploy to Odoo Server

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      database:
        description: 'Database to upgrade modules on'
        required: true
        default: 'odoo HR'
        type: choice
        options:
          - 'odoo HR'
          - odoo18
          - none
      modules:
        description: 'Modules to upgrade (comma-separated, leave empty = auto-detect changed)'
        required: false
        default: ''

env:
  ALL_CUSTOM_MODULES: >-
    sht_hr_base,sht_hr_reward_discipline,sht_hr_training,
    sht_hr_contract,sht_hr_leave,sht_hr_recruitment,sht_hr_onboarding,
    hr_payroll_vietnam,hr_social_insurance_vn,hr_request_vn,
    hr_decision_vn,hr_asset_vn,sht_hr_appraisal_vn,
    hr_kpi_okr,hr_digital_sign_vn

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Detect changed modules
        id: changes
        run: |
          if [ -n "${{ github.event.inputs.modules }}" ]; then
            echo "modules=${{ github.event.inputs.modules }}" >> $GITHUB_OUTPUT
            echo "Using manual modules: ${{ github.event.inputs.modules }}"
          else
            # Auto-detect changed module directories
            CHANGED=$(git diff --name-only ${{ github.event.before || 'HEAD~1' }} HEAD | grep -oP '^[^/]+' | sort -u | tr '\n' ',' | sed 's/,$//')
            KNOWN="sht_hr_base sht_hr_reward_discipline sht_hr_training sht_hr_contract sht_hr_leave sht_hr_recruitment sht_hr_onboarding hr_payroll_vietnam hr_social_insurance_vn hr_request_vn hr_decision_vn hr_asset_vn sht_hr_appraisal_vn hr_kpi_okr hr_digital_sign_vn mfg_dashboard"
            MODULES=""
            for dir in $(echo "$CHANGED" | tr ',' ' '); do
              if echo "$KNOWN" | grep -qw "$dir"; then
                MODULES="${MODULES:+$MODULES,}$dir"
              fi
            done
            echo "modules=$MODULES" >> $GITHUB_OUTPUT
            echo "Auto-detected changed modules: $MODULES"
          fi

      - name: Pull latest custom modules on server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'DEPLOY_EOF'
            set -e
            # Fix git safe.directory for root-owned repo
            git config --global --add safe.directory /opt/odoo18/custom_addons
            cd /opt/odoo18/custom_addons

            # Ensure .git exists and remote is set
            if [ ! -d .git ]; then
              echo "⚠️ .git missing, restoring..."
              git init
            fi
            git remote set-url origin https://github.com/tringo2204/odoo-18.git 2>/dev/null \
              || git remote add origin https://github.com/tringo2204/odoo-18.git

            # Fetch latest main branch — use explicit ref so origin/main is updated
            git fetch origin main

            # Checkout all files from origin/main (avoids FETCH_HEAD ambiguity)
            git checkout origin/main -- .

            echo "✅ Code updated successfully ($(git rev-parse --short origin/main))"
          DEPLOY_EOF

      - name: Upgrade odoo HR database
        if: >
          steps.changes.outputs.modules != '' &&
          (github.event_name == 'push' || github.event.inputs.database == 'odoo HR')
        run: |
          MODULES="${{ steps.changes.outputs.modules }}"
          echo "=== Upgrading odoo HR: $MODULES ==="
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << SSHEOF
          systemctl stop odoo18 2>/dev/null || true
          pkill -9 -f 'odoo-bin' 2>/dev/null || true
          sleep 2
          /opt/odoo18/.venv/bin/python /opt/odoo18/odoo-bin \
            -c /opt/odoo18/odoo.conf -d 'odoo HR' -u $MODULES \
            --stop-after-init --no-http 2>&1 | tail -10
          echo "EXIT_HR:\$?"
          SSHEOF

      - name: Upgrade odoo18 database
        if: >
          steps.changes.outputs.modules != '' &&
          (github.event_name == 'push' || github.event.inputs.database == 'odoo18')
        run: |
          MODULES="${{ steps.changes.outputs.modules }}"
          echo "=== Upgrading odoo18: $MODULES ==="
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << SSHEOF
          pkill -9 -f 'odoo-bin' 2>/dev/null || true
          sleep 2
          /opt/odoo18/.venv/bin/python /opt/odoo18/odoo-bin \
            -c /opt/odoo18/odoo.conf -d odoo18 -u $MODULES \
            --stop-after-init --no-http 2>&1 | tail -10
          echo "EXIT_O18:\$?"
          SSHEOF

      - name: Start Odoo after upgrade
        if: steps.changes.outputs.modules != ''
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "systemctl start odoo18 && sleep 3 && systemctl is-active odoo18 && echo 'Odoo restarted OK' || echo 'Odoo failed to start'"

      - name: Restart Odoo (no module changes)
        if: steps.changes.outputs.modules == ''
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "systemctl restart odoo18 && sleep 3 && systemctl is-active odoo18 && echo 'Odoo restarted OK'"
