name: Deploy to Odoo Server

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      database:
        description: 'Database to upgrade modules on'
        required: true
        default: 'none'
        type: choice
        options:
          - none
          - odoo18
          - odoo18_manufacturing_demo
      modules:
        description: 'Modules to upgrade (comma-separated, e.g. sht_hr_base,sht_hr_training)'
        required: false
        default: ''

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Pull latest custom modules on server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e
            cd /opt/odoo18

            # Fetch latest from our GitHub repo
            git fetch https://github.com/tringo2204/odoo-18.git main

            # Only checkout our custom module folders — never touch Odoo core
            MODULES="sht_hr_base sht_hr_reward_discipline sht_hr_training \
                     sht_hr_contract sht_hr_leave sht_hr_recruitment sht_hr_onboarding \
                     hr_payroll_vietnam hr_social_insurance_vn hr_request_vn \
                     hr_decision_vn hr_asset_vn \
                     mfg_dashboard theme_omux .github"

            for MODULE in $MODULES; do
              git checkout FETCH_HEAD -- $MODULE 2>/dev/null && echo "✅ Updated $MODULE" || echo "⚠️  Skipped $MODULE (not found)"
            done

            echo "✅ Code updated successfully"
          EOF

      - name: Restart Odoo service
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            systemctl restart odoo18
            sleep 5
            systemctl is-active odoo18 && echo "✅ Odoo restarted successfully" || echo "❌ Odoo failed to restart"
          EOF

      - name: Upgrade modules on database (if specified)
        if: ${{ github.event.inputs.database != 'none' && github.event.inputs.database != '' && github.event.inputs.modules != '' }}
        run: |
          DB="${{ github.event.inputs.database }}"
          MODULES="${{ github.event.inputs.modules }}"
          echo "Upgrading [$MODULES] on [$DB]..."
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << EOF
            systemctl stop odoo18
            /opt/odoo18/.venv/bin/python /opt/odoo18/odoo-bin \
              -c /opt/odoo18/odoo.conf \
              -d $DB \
              -u $MODULES \
              --stop-after-init \
              --no-http
            systemctl start odoo18
            echo "✅ Modules upgraded on $DB"
          EOF
