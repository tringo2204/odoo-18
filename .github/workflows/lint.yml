name: Lint & Static Analysis

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Python Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linting tools
        run: |
          pip install flake8

      - name: Run flake8
        continue-on-error: true
        run: |
          flake8 . \
            --max-line-length=120 \
            --exclude=__manifest__.py,__openerp__.py,migrations,theme_omux,mfg_dashboard \
            --ignore=W503,W504,E303,E302,E305,E261,E262,F401,F811,E501,W292,W391 \
            --extend-exclude=".github" \
            --count --statistics
